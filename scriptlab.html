<h2>Script Lab</h2>

<div id="letter"></div>
<div id="sound"></div>
<div id="compare"></div>

<button onclick="next()">Next Letter</button>

<script>

const letters = [

{l:"ಕ",s:"ka",h:"क",t:"க"},
{l:"ತ",s:"ta",h:"त",t:"த"},
{l:"ನ",s:"na",h:"न",t:"ந"},
{l:"ಗ",s:"ga",h:"ग",t:"க"}

]

let i=0

function show(){

let x=letters[i]

document.getElementById("letter").innerHTML=x.l
document.getElementById("sound").innerHTML="Sound: "+x.s
document.getElementById("compare").innerHTML=
"Hindi: "+x.h+" | Tamil: "+x.t

}

function next(){

i=(i+1)%letters.length
show()

}

show()

</script>
